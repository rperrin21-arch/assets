<meta charset="UTF-8">
<style>
  #v3d {
    width: 100%;
    height: 100vh;
    position: relative;
    cursor: grab;
  }
  #v3d:active { cursor: grabbing; }
  #v3d canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }
  #v3d-spinner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 24px; height: 24px;
    border: 1.5px solid rgba(128,128,128,0.2);
    border-top-color: rgba(128,128,128,0.6);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
</style>

<div id="v3d">
  <div id="v3d-spinner"></div>
</div>

<script>
(function () {
  var MODEL_URL = 'https://cdn.jsdelivr.net/gh/rperrin21-arch/assets@main/crane.glb';

  function loadScript(src, cb) {
    var s = document.createElement('script');
    s.src = src; s.onload = cb;
    document.head.appendChild(s);
  }

  loadScript('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js', function () {
    loadScript('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js', function () {
      init();
    });
  });

  function init() {
    var container = document.getElementById('v3d');
    var spinner   = document.getElementById('v3d-spinner');

    var scene  = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0, 5);

    var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setClearColor(0x000000, 0);
    renderer.outputEncoding = THREE.sRGBEncoding;
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    var d1 = new THREE.DirectionalLight(0xffffff, 0.8); d1.position.set(5, 8, 5); scene.add(d1);
    var d2 = new THREE.DirectionalLight(0xffffff, 0.3); d2.position.set(-5, -3, -5); scene.add(d2);

    var model = null;
    var targetRotX = 0, targetRotY = 0;
    var currentRotX = 0, currentRotY = 0;
    var isDragging = false, lastX = 0, lastY = 0;
    var zoom = 5;

    container.addEventListener('mousedown', function (e) { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup', function () { isDragging = false; });
    window.addEventListener('mousemove', function (e) {
      if (!isDragging) return;
      targetRotY += (e.clientX - lastX) * 0.01;
      targetRotX += (e.clientY - lastY) * 0.01;
      lastX = e.clientX; lastY = e.clientY;
    });
    container.addEventListener('wheel', function (e) {
      e.preventDefault();
      zoom = Math.max(1.5, Math.min(20, zoom + e.deltaY * 0.01));
    }, { passive: false });
    window.addEventListener('resize', function () {
      if (!container.clientWidth || !container.clientHeight) return;
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    new THREE.GLTFLoader().load(
      MODEL_URL,
      function (gltf) {
        model = gltf.scene;
        var box    = new THREE.Box3().setFromObject(model);
        var center = box.getCenter(new THREE.Vector3());
        var size   = box.getSize(new THREE.Vector3());
        var scale  = 3 / Math.max(size.x, size.y, size.z);
        model.scale.multiplyScalar(scale);
        model.position.sub(center.clone().multiplyScalar(scale));
        scene.add(model);
        spinner.style.opacity = '0';
        setTimeout(function () { spinner.style.display = 'none'; }, 600);
      },
      null,
      function (err) { console.error('Erreur GLB :', err); }
    );

    (function animate() {
      requestAnimationFrame(animate);
      var damp = 0.06;
      currentRotX += (targetRotX - currentRotX) * damp;
      currentRotY += (targetRotY - currentRotY) * damp;
      if (model) { model.rotation.x = currentRotX; model.rotation.y = currentRotY; }
      camera.position.z += (zoom - camera.position.z) * 0.1;
      renderer.render(scene, camera);
    })();
  }
})();
</script>
